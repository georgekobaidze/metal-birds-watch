name: Deploy to GitHub Pages

on:
  push:
    branches: [feature/front-end-backbone]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject backend URL (optional)
        run: |
          # Uncomment and configure if you need a custom backend URL
          # echo "window.ENV_API_URL = '${{ secrets.BACKEND_URL }}';" > frontend/env.js
          echo "Skipping custom backend URL injection - using default"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
